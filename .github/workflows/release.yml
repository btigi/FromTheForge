name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: ./src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish FromTheForge.csproj -c Release --property:PublishDir=../publish

      - name: Create Release Zip
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Compress-Archive -Path "../publish/*" -DestinationPath "../FromTheForge-$version.zip" -Force

      - name: Attach build to GitHub Release
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $zip = "../FromTheForge-$version.zip"
          $repo = $env:GITHUB_REPOSITORY
          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip --repo $repo --clobber
          } else {
            gh release create $tag $zip --repo $repo --title $version --generate-notes --latest
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
